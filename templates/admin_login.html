<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - FrescoFruits</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">
                <i class="fas fa-leaf"></i> Fresco<span class="admin-login-brand">Fruits</span>

            </div>
            <h1>Admin Login</h1>
            <p>Kelola produk dan pesanan Anda</p>
        </div>

        {% if error %}
        <div class="error-message">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}

        <form method="post" action="/admin/login">
            <div class="form-group">
                <label>
                    <i class="fas fa-user"></i> ID Admin
                </label>
                <div class="icon-input">
                    <input type="text" name="admin_id" required placeholder="Masukkan ID admin" orangjelekgabolehmasuk>
                    <i class="fas fa-user"></i>
                </div>
            </div>

            <div class="form-group">
                <label>
                    <i class="fas fa-lock"></i> Password Admin
                </label>
                <div class="icon-input">
                    <input type="password" name="password" required placeholder="Masukkan password"301512132020>
                    <i class="fas fa-lock"></i>
                </div>
            </div>

            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <div class="divider">atau</div>

        <div class="back-link">
            <a href="/"><i class="fas fa-arrow-left"></i> Kembali ke Toko</a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='admin_login.js') }}" defer></script>
</body>
</html>
